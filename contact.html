<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kontakt</title>
</head>
<body>

<form id="contactForm">
  <input type="text" name="name" placeholder="Name" required>
  <input type="email" name="email" placeholder="Email" required>
  <textarea name="message" placeholder="Nachricht" required></textarea>
  <button type="submit">Senden</button>
</form>

<p id="successMessage" style="display:none;">Danke! Nachricht gesendet.</p>

<!-- 👉 HIER kommt das JavaScript hin -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  fetch("https://hook.eu1.make.com/lkfspdq08968rses3a6q5mq9d89kliiv", {
    method: "POST",
    body: formData
  })
  .then(response => {
    document.getElementById("successMessage").style.display = "block";
    document.getElementById("contactForm").reset();
  })
  .catch(error => {
    alert("Fehler beim Senden");
  });
});
</script>

</body>
</html>

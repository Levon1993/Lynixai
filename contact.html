<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lynix AI</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-container">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="Lynix AI Logo" class="logo">
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Leistungen</a>
      <a href="about.html">Über uns</a>
      <a href="contact.html">Kontakt</a>
    </nav>
  </div>
</header>

<!-- KONTAKTFORMULAR -->
<form id="contactForm">
  <input type="text" name="name" placeholder="Name" required>
  <input type="email" name="email" placeholder="Email" required>
  <textarea name="message" placeholder="Nachricht" required></textarea>
  <button type="submit">Senden</button>
</form>

<p id="successMessage" style="display:none;">Danke! Nachricht gesendet.</p>

<!-- SCRIPT GANZ UNTEN -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  fetch("https://hook.eu1.make.com/lkfspdq08968rses3a6q5mq9d89kliiv", {
    method: "POST",
    body: formData
  })
  .then(response => {
    document.getElementById("successMessage").style.display = "block";
    document.getElementById("contactForm").reset();
  })
  .catch(error => {
    alert("Fehler beim Senden");
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lynix AI</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-container">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="Lynix AI Logo" class="logo">
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Leistungen</a>
      <a href="about.html">Über uns</a>
      <a href="contact.html">Kontakt</a>
    </nav>
  </div>
</header>

<section class="contact-section">
  <h1>Kontakt</h1>
  <p>Schreib uns eine Nachricht – wir melden uns schnellstmöglich.</p>

  <form id="contactForm" class="contact-form">
    <input type="text" name="name" placeholder="Dein Name" required>
    <input type="email" name="email" placeholder="Deine Email" required>
    <textarea name="message" placeholder="Deine Nachricht" required></textarea>
    <button type="submit">Nachricht senden</button>
  </form>

  <div id="successMessage" class="success-message">
    ✅ Danke! Deine Nachricht wurde gesendet.
  </div>
</section>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  fetch("https://hook.eu1.make.com/lkfspdq08968rses3a6q5mq9d89kliiv", {
    method: "POST",
    body: formData
  })
  .then(() => {
    document.getElementById("successMessage").style.display = "block";
    document.getElementById("contactForm").reset();
  })
  .catch(() => {
    alert("Fehler beim Senden");
  });
});
</script>
</body>
</html>
